#### training devices
device:
  cuda: True
  gpus: 0
  ids: [0]

#### datasets
datasets:
  name: LoLI_Street
  train:
    train_path: /content/Train
    n_workers: 1  # per GPU
    batch_size_train: 4
    cropsize: 256   # size you want to crop out as input sample.
    flips: True
    verbose: True
    crop_type: Random
  val:
    test_path: /content/Val
    batch_size_test: 1

#### network structures
network:
  name: DarkIR
  resume_training: False
  pretrained_weights: /content/DarkIR_384.pt  # path to pretrained .pt for transfer learning, or null to skip
  img_channels: 3
  width: 32
  middle_blk_num_enc: 2
  middle_blk_num_dec: 2
  enc_blk_nums: [1, 2, 3]
  dec_blk_nums: [3, 1, 1]
  dilations: [1, 4, 9]
  extra_depth_wise: True

#### training settings: learning rate scheme, loss
train:
  lr_initial: !!float 5e-4
  lr_scheme: CosineAnnealing
  betas: [0.9, 0.9]
  epochs: 50
  lr_gamma: 0.5
  weight_decay: !!float 1e-3
  eta_min: !!float 1e-6

  pixel_criterion: l1
  pixel_weight: 1.0

  perceptual: True
  perceptual_criterion: l1
  perceptual_weight: 0.01
  perceptual_reduction: mean

  edge: True
  edge_criterion: l2
  edge_weight: 50.0
  edge_reduction: mean

  frequency: False
  frequency_criterion: l2
  frequency_weight: 0.01
  frequency_reduction: sum

  enhance: True
  enhance_criterion: l1
  enhance_weight: 0.8
  enhance_reduction: mean


#### save model
save:
  path: ./models/DarkIR_384_LOLI.pt
  best: ./models/bests/DarkIR_384_LOLI_best.pt
  new: ./models/DarkIR_384_LOLI_new.pt

#### wandb:
wandb:
  init: False
  project: GOPRO_LOLBlur
  entity: cidautai
  name: Network_LOLBlur_dilation1
  save_code: True
  resume: never # resume: must, if uploading to an existing project
  id: None # must be None if don't want to overwrite an existing project





